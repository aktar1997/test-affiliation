version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - env | grep -e AUTH_SECRET >> .env.production
        - env | grep -e AUTH_TRUST_HOST >> .env.production
        - env | grep -e NEXT_PUBLIC_API_BASE_URL >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
